<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character History — JoJo</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />

    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="top-bar">
      <div class="logo">JOJO</div>
      <nav>
        <a href="#" id="home-link">Home</a>
      </nav>
    </header>

    <main class="history-container" data-aos="fade-up" data-aos-delay="200">
      <div class="history-content">
        <h1 id="character-name" data-aos="fade-up" data-aos-delay="300"></h1>
        <h3
          id="character-subtitle"
          data-aos="fade-up"
          data-aos-delay="400"
        ></h3>
        <div
          class="history-text"
          id="character-history"
          data-aos="fade-up"
          data-aos-delay="500"
        ></div>
      </div>
    </main>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script src="history.js"></script>
  </body>
</html>
